<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NME GYM — Admin Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="admin-login-container">
  <div class="admin-login-bg"></div>
  <div class="admin-login-box reveal visible">
    <div class="admin-login-header">
      <img src="../newlogo.png" alt="NME GYM" class="admin-login-logo">
      <div>
        <h2>ADMIN PORTAL</h2>
        <p>NME GYM — Restricted Access</p>
      </div>
    </div>
    <div class="admin-login-body">
      <div class="admin-hint">Demo — Email: <strong>admin@nmegym.in</strong> · PW: <strong>nme2025</strong></div>
      <div class="form-group">
        <label class="admin-label">EMAIL / PHONE</label>
        <input class="admin-input" type="text" id="adminUser" placeholder="admin@nmegym.in">
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="admin-label">PASSWORD</label>
        <input class="admin-input" type="password" id="adminPass" placeholder="••••••••">
      </div>
      <button class="btn-primary" style="width:100%;border:none;" onclick="adminLogin()">ACCESS DASHBOARD →</button>
      <a class="admin-login-back" href="/">← Back to Website</a>
    </div>
  </div>
  <p class="admin-login-footer">NME GYM · Chumoukedima, Nagaland</p>
</div>


<script src="../assets/js/main.js"></script>
</body>
</html>
